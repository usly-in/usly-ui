<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>usly</title>
    <script>
      /**
       * GitHub Pages SPA redirect trick.
       * Preserves the path when GitHub Pages would serve a 404 for deep links.
       * segmentCount=1 keeps the /usly-ui basePath segment intact.
       *
       * Source: https://github.com/rafgraph/spa-github-pages (MIT)
       */
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
